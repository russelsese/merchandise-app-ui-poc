<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MerchSnap — Select Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#f0f4ff', 100:'#dce8ff', 500:'#4169e1', 600:'#3457c8', 700:'#2a45a8' }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #app {
      width: 100%;
      max-width: 390px;
      height: 100vh;
      background: #f9fafb;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,0,0,0.18);
    }
    @media (max-width: 390px) {
      #app { box-shadow: none; }
      body { background: #f9fafb; }
    }
    #store-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    #store-list::-webkit-scrollbar { display: none; }
    .store-item { transition: background 0.12s; }
    .store-item:active { background: #f0f4ff; }
    .pill { transition: all 0.15s; }
    #search-input:focus { outline: none; }
    mark { background: #dce8ff; color: #2a45a8; border-radius: 2px; padding: 0 1px; }
  </style>
</head>
<body>
<div id="app">

  <!-- Status bar spacer -->
  <div class="h-10 bg-white flex-shrink-0"></div>

  <!-- Top nav -->
  <div class="bg-white flex items-center px-4 pb-3 flex-shrink-0 border-b border-gray-100">
    <a href="index.html" class="flex items-center justify-center w-9 h-9 rounded-full hover:bg-gray-100 -ml-1 mr-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <div class="flex-1">
      <h1 class="text-base font-semibold text-gray-800 leading-tight">Select a Store</h1>
      <p class="text-xs text-gray-400">Choose where you're uploading from</p>
    </div>
  </div>

  <!-- Search bar -->
  <div class="bg-white px-4 pt-3 pb-3 flex-shrink-0">
    <div class="flex items-center gap-2 bg-gray-100 rounded-2xl px-3 py-2.5">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 105 11a6 6 0 0012 0z"/>
      </svg>
      <input id="search-input" type="text" placeholder="Search by name or address…"
        class="flex-1 bg-transparent text-sm text-gray-700 placeholder-gray-400 border-none" />
      <button id="clear-btn" class="hidden w-4 h-4 text-gray-400" onclick="clearSearch()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Filter pills -->
  <div class="bg-white px-4 pb-3 flex items-center gap-2 flex-shrink-0 border-b border-gray-100">
    <button id="pill-all" onclick="setFilter('all')"
      class="pill text-xs font-medium px-3 py-1.5 rounded-full bg-brand-500 text-white">
      All Stores
    </button>
    <button id="pill-nearby" onclick="setFilter('nearby')"
      class="pill text-xs font-medium px-3 py-1.5 rounded-full bg-gray-100 text-gray-500 flex items-center gap-1">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a2 2 0 01-2.828 0l-4.243-4.243a8 8 0 1111.314 0z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      Near Me
    </button>
    <span id="count-label" class="ml-auto text-xs text-gray-400"></span>
  </div>

  <!-- Store list -->
  <div id="store-list" class="px-4 pt-3 pb-24 space-y-2">
    <!-- Rendered by JS -->
  </div>

  <!-- Empty state -->
  <div id="empty-state" class="hidden flex-1 flex flex-col items-center justify-center text-center px-8 py-16">
    <div class="w-14 h-14 rounded-full bg-gray-100 flex items-center justify-center mb-4">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 105 11a6 6 0 0012 0z"/>
      </svg>
    </div>
    <p class="text-sm font-medium text-gray-500">No stores found</p>
    <p class="text-xs text-gray-400 mt-1">Try a different search term or <br/>add a new store below.</p>
  </div>

  <!-- FAB: Add Store -->
  <div class="absolute bottom-6 right-5">
    <a href="add-store.html"
       class="flex items-center gap-2 bg-brand-500 text-white text-sm font-semibold px-5 py-3.5 rounded-full shadow-lg active:scale-95 transition-transform">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
      </svg>
      Add Store
    </a>
  </div>

</div>

<script>
  const stores = [
    { id: 1, name: 'Woolworths Metro', address: '123 George St, Sydney NSW 2000', distance: 0.3, color: '#16a34a' },
    { id: 2, name: 'Coles',            address: '12 Elizabeth St, Sydney NSW 2000', distance: 0.5, color: '#dc2626' },
    { id: 3, name: 'Woolworths',       address: '456 Bourke St, Melbourne VIC 3000', distance: 1.2, color: '#16a34a' },
    { id: 4, name: 'Target',           address: '45 Swanston St, Melbourne VIC 3000', distance: 1.8, color: '#d97706' },
    { id: 5, name: 'Woolworths',       address: '789 Queen St, Brisbane QLD 4000', distance: 2.1, color: '#16a34a' },
    { id: 6, name: 'Coles Central',    address: '288 Bourke St, Melbourne VIC 3000', distance: 3.4, color: '#dc2626' },
    { id: 7, name: 'Big W',            address: '550 George St, Sydney NSW 2000', distance: 4.1, color: '#1d4ed8' },
  ];

  let currentFilter = 'all';
  let searchQuery   = '';

  function initials(name) {
    return name.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
  }

  function highlight(text, query) {
    if (!query) return text;
    const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    return text.replace(re, '<mark>$1</mark>');
  }

  function setFilter(f) {
    currentFilter = f;
    document.getElementById('pill-all').className    = 'pill text-xs font-medium px-3 py-1.5 rounded-full ' +
      (f === 'all' ? 'bg-brand-500 text-white' : 'bg-gray-100 text-gray-500');
    document.getElementById('pill-nearby').className = 'pill text-xs font-medium px-3 py-1.5 rounded-full flex items-center gap-1 ' +
      (f === 'nearby' ? 'bg-brand-500 text-white' : 'bg-gray-100 text-gray-500');
    // Re-render with SVG colour fix for nearby pill
    const nearbySvg = document.querySelector('#pill-nearby svg');
    if (nearbySvg) nearbySvg.style.stroke = f === 'nearby' ? 'white' : '#6b7280';
    render();
  }

  function clearSearch() {
    document.getElementById('search-input').value = '';
    searchQuery = '';
    document.getElementById('clear-btn').classList.add('hidden');
    render();
  }

  function render() {
    let list = [...stores];

    if (currentFilter === 'nearby') {
      list.sort((a, b) => a.distance - b.distance);
    }

    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      list = list.filter(s =>
        s.name.toLowerCase().includes(q) ||
        s.address.toLowerCase().includes(q)
      );
    }

    const container   = document.getElementById('store-list');
    const emptyState  = document.getElementById('empty-state');
    const countLabel  = document.getElementById('count-label');

    countLabel.textContent = `${list.length} store${list.length !== 1 ? 's' : ''}`;

    if (list.length === 0) {
      container.innerHTML = '';
      emptyState.classList.remove('hidden');
      emptyState.classList.add('flex');
      return;
    }

    emptyState.classList.add('hidden');
    emptyState.classList.remove('flex');

    container.innerHTML = list.map(s => {
      const distBadge = currentFilter === 'nearby'
        ? `<span class="text-xs text-gray-400">${s.distance} km</span>`
        : '';
      return `
        <a href="photo-capture.html?name=${encodeURIComponent(s.name)}&address=${encodeURIComponent(s.address)}"
           class="store-item flex items-center gap-3 bg-white rounded-2xl px-4 py-3.5 shadow-sm border border-gray-100 active:bg-brand-50">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 text-white text-xs font-bold"
               style="background:${s.color}">
            ${initials(s.name)}
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-semibold text-gray-800 truncate">${highlight(s.name, searchQuery)}</p>
            <p class="text-xs text-gray-400 truncate mt-0.5">${highlight(s.address, searchQuery)}</p>
          </div>
          <div class="flex items-center gap-2 flex-shrink-0">
            ${distBadge}
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
            </svg>
          </div>
        </a>`;
    }).join('');
  }

  document.getElementById('search-input').addEventListener('input', function () {
    searchQuery = this.value.trim();
    document.getElementById('clear-btn').classList.toggle('hidden', !searchQuery);
    render();
  });

  render();
</script>
</body>
</html>
