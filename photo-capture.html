<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MerchSnap — Upload Photos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#f0f4ff', 100:'#dce8ff', 500:'#4169e1', 600:'#3457c8', 700:'#2a45a8' }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #app {
      width: 100%;
      max-width: 390px;
      height: 100vh;
      background: #f9fafb;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,0,0,0.18);
    }
    @media (max-width: 390px) {
      #app { box-shadow: none; }
      body { background: #f9fafb; }
    }
    #photo-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    #photo-scroll::-webkit-scrollbar { display: none; }

    /* Photo grid thumbnails */
    .thumb-wrap { position: relative; aspect-ratio: 1; border-radius: 0.75rem; overflow: hidden; }
    .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .thumb-remove {
      position: absolute; top: 5px; right: 5px;
      width: 22px; height: 22px;
      background: rgba(0,0,0,0.55); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .thumb-remove svg { width: 12px; height: 12px; }

    /* Upload overlay */
    #upload-overlay {
      position: absolute; inset: 0; background: white;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.25s;
      padding: 2rem;
    }
    #upload-overlay.show { opacity: 1; pointer-events: all; }

    /* Progress bar track */
    #progress-track { width: 100%; height: 8px; background: #e5e7eb; border-radius: 9999px; overflow: hidden; margin-top: 1rem; }
    #progress-fill  { height: 100%; background: #4169e1; border-radius: 9999px; width: 0%; transition: width 0.15s linear; }

    /* Success state (inside overlay) */
    #upload-success { display: none; flex-direction: column; align-items: center; text-align: center; }

    /* Bounce animation for success checkmark */
    @keyframes pop { 0% { transform: scale(0.5); opacity:0; } 70% { transform: scale(1.15); } 100% { transform: scale(1); opacity:1; } }
    .pop { animation: pop 0.4s ease forwards; }
  </style>
</head>
<body>
<div id="app">

  <!-- Status bar spacer -->
  <div class="h-10 bg-white flex-shrink-0"></div>

  <!-- Top nav -->
  <div class="bg-white flex items-center px-4 pb-3 flex-shrink-0 border-b border-gray-100">
    <a href="store-selection.html" class="flex items-center justify-center w-9 h-9 rounded-full hover:bg-gray-100 -ml-1 mr-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <div class="flex-1">
      <h1 class="text-base font-semibold text-gray-800 leading-tight">Upload Photos</h1>
      <p class="text-xs text-gray-400">Document merchandise condition</p>
    </div>
  </div>

  <!-- Selected store banner -->
  <div class="bg-white border-b border-gray-100 px-4 py-2.5 flex items-center gap-2.5 flex-shrink-0">
    <div class="w-7 h-7 rounded-lg bg-brand-500 flex items-center justify-center flex-shrink-0">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
      </svg>
    </div>
    <div class="flex-1 min-w-0">
      <p id="store-name-label" class="text-xs font-semibold text-gray-700 truncate"></p>
      <p id="store-addr-label" class="text-xs text-gray-400 truncate"></p>
    </div>
    <a href="store-selection.html" class="text-xs text-brand-500 font-medium flex-shrink-0">Change</a>
  </div>

  <!-- Geo timestamp strip -->
  <div id="geo-strip" class="bg-brand-50 border-b border-brand-100 px-4 py-2 flex items-center gap-4 flex-shrink-0">
    <div class="flex items-center gap-1.5">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-brand-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a2 2 0 01-2.828 0l-4.243-4.243a8 8 0 1111.314 0z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      <span id="geo-label" class="text-xs text-brand-600">Acquiring location…</span>
    </div>
    <div class="flex items-center gap-1.5 ml-auto">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-brand-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="9" stroke="currentColor" fill="none"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 7v5l3 3"/>
      </svg>
      <span id="time-label" class="text-xs text-brand-600 tabular-nums"></span>
    </div>
  </div>

  <!-- Scrollable content: empty state OR photo grid -->
  <div id="photo-scroll">

    <!-- Empty state -->
    <div id="empty-state" class="flex flex-col items-center justify-center text-center px-8 py-16">
      <div class="w-20 h-20 rounded-3xl bg-white border-2 border-dashed border-gray-200 flex items-center justify-center mb-5 shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-9 h-9 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3 9.75A2.25 2.25 0 015.25 7.5h.878a1.5 1.5 0 001.342-.83L8.25 5.25h7.5l.78 1.42A1.5 1.5 0 0017.872 7.5h.878A2.25 2.25 0 0121 9.75v8.25A2.25 2.25 0 0118.75 20.25H5.25A2.25 2.25 0 013 18V9.75z"/>
          <circle cx="12" cy="13.5" r="3" stroke="currentColor" fill="none"/>
        </svg>
      </div>
      <h2 class="text-base font-semibold text-gray-700 mb-1.5">No photos yet</h2>
      <p class="text-sm text-gray-400 leading-relaxed max-w-xs">
        Use the buttons below to take photos with your camera or choose existing ones from your gallery.
      </p>

      <!-- Action buttons in empty state -->
      <div class="flex flex-col gap-3 w-full max-w-xs mt-8">
        <button onclick="document.getElementById('camera-input').click()"
          class="flex items-center justify-center gap-2.5 bg-brand-500 text-white font-semibold text-sm py-4 rounded-2xl shadow active:scale-95 transition-transform">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 9.75A2.25 2.25 0 015.25 7.5h.878a1.5 1.5 0 001.342-.83L8.25 5.25h7.5l.78 1.42A1.5 1.5 0 0017.872 7.5h.878A2.25 2.25 0 0121 9.75v8.25A2.25 2.25 0 0118.75 20.25H5.25A2.25 2.25 0 013 18V9.75z"/>
            <circle cx="12" cy="13.5" r="3" stroke="currentColor" fill="none"/>
          </svg>
          Take Photo
        </button>
        <button onclick="document.getElementById('gallery-input').click()"
          class="flex items-center justify-center gap-2.5 bg-white border border-gray-200 text-gray-700 font-semibold text-sm py-4 rounded-2xl shadow-sm active:scale-95 transition-transform">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
          Choose from Gallery
        </button>
      </div>
    </div>

    <!-- Photo grid (hidden until photos selected) -->
    <div id="photo-grid-wrap" class="hidden px-4 pt-4 pb-36">
      <div class="flex items-center justify-between mb-3">
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Selected Photos</p>
        <span id="photo-count-badge" class="text-xs bg-brand-100 text-brand-600 font-semibold px-2.5 py-1 rounded-full"></span>
      </div>
      <div id="photo-grid" class="grid grid-cols-3 gap-2"></div>

      <!-- Add more row -->
      <div class="flex gap-2 mt-3">
        <button onclick="document.getElementById('camera-input').click()"
          class="flex-1 flex items-center justify-center gap-2 border border-dashed border-gray-300 rounded-2xl py-3 text-xs text-gray-400 active:bg-gray-50">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 9.75A2.25 2.25 0 015.25 7.5h.878a1.5 1.5 0 001.342-.83L8.25 5.25h7.5l.78 1.42A1.5 1.5 0 0017.872 7.5h.878A2.25 2.25 0 0121 9.75v8.25A2.25 2.25 0 0118.75 20.25H5.25A2.25 2.25 0 013 18V9.75z"/>
            <circle cx="12" cy="13.5" r="3" stroke="currentColor" fill="none"/>
          </svg>
          Camera
        </button>
        <button onclick="document.getElementById('gallery-input').click()"
          class="flex-1 flex items-center justify-center gap-2 border border-dashed border-gray-300 rounded-2xl py-3 text-xs text-gray-400 active:bg-gray-50">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
          Gallery
        </button>
      </div>
    </div>

  </div><!-- /photo-scroll -->

  <!-- Bottom bar (only when photos selected) -->
  <div id="bottom-bar" class="hidden absolute bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-4 py-4 pb-8">
    <button id="upload-btn" onclick="startUpload()"
      class="w-full bg-brand-500 text-white font-semibold text-sm py-4 rounded-2xl shadow flex items-center justify-center gap-2 active:scale-95 transition-transform">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
      </svg>
      <span id="upload-btn-label">Upload 0 Photos</span>
    </button>
  </div>

  <!-- Hidden file inputs -->
  <input id="camera-input"  type="file" accept="image/*" capture="environment" class="hidden" />
  <input id="gallery-input" type="file" accept="image/*" multiple class="hidden" />

  <!-- Upload overlay -->
  <div id="upload-overlay">
    <!-- Progress state -->
    <div id="upload-progress-state" class="w-full flex flex-col items-center">
      <div class="w-16 h-16 rounded-full bg-brand-50 flex items-center justify-center mb-5">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-brand-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
        </svg>
      </div>
      <h2 class="text-lg font-bold text-gray-800 mb-1">Uploading…</h2>
      <p id="upload-sub" class="text-sm text-gray-400 mb-6">Please keep the app open.</p>
      <div id="progress-track" class="w-full max-w-xs">
        <div id="progress-fill"></div>
      </div>
      <p id="progress-label" class="text-xs text-gray-400 mt-3">0%</p>
    </div>

    <!-- Success state -->
    <div id="upload-success" class="flex flex-col items-center text-center">
      <div class="w-20 h-20 rounded-full bg-green-100 flex items-center justify-center mb-5 pop">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <h2 class="text-xl font-bold text-gray-800 mb-2">Upload Complete!</h2>
      <p id="success-msg" class="text-sm text-gray-400 mb-8"></p>
      <div class="flex flex-col gap-3 w-full max-w-xs px-4">
        <button onclick="uploadMore()"
          class="bg-brand-500 text-white font-semibold text-sm py-4 rounded-2xl shadow">
          Upload More Photos
        </button>
        <a href="store-selection.html"
          class="bg-white border border-gray-200 text-gray-600 font-medium text-sm py-4 rounded-2xl text-center shadow-sm">
          Change Store
        </a>
      </div>
    </div>
  </div>

</div>

<script>
  // ── URL params ──────────────────────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const storeName = params.get('name') || 'Unknown Store';
  const storeAddr = params.get('address') || '';
  document.getElementById('store-name-label').textContent = storeName;
  document.getElementById('store-addr-label').textContent = storeAddr;

  // ── Live clock ──────────────────────────────────────────────────────
  function tickClock() {
    const now = new Date();
    document.getElementById('time-label').textContent =
      now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }
  tickClock();
  setInterval(tickClock, 1000);

  // ── Geolocation (simulated if unavailable) ──────────────────────────
  const geoLabel = document.getElementById('geo-label');
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        const lat = pos.coords.latitude.toFixed(4);
        const lng = pos.coords.longitude.toFixed(4);
        geoLabel.textContent = `${lat}, ${lng}`;
      },
      () => { geoLabel.textContent = '-33.8688, 151.2093  (simulated)'; }
    );
  } else {
    geoLabel.textContent = '-33.8688, 151.2093  (simulated)';
  }

  // ── Photo management ─────────────────────────────────────────────────
  let photos = []; // { url, name }

  function addFiles(files) {
    Array.from(files).forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        photos.push({ url: e.target.result, name: file.name });
        renderGrid();
      };
      reader.readAsDataURL(file);
    });
  }

  document.getElementById('camera-input').addEventListener('change',  e => addFiles(e.target.files));
  document.getElementById('gallery-input').addEventListener('change', e => addFiles(e.target.files));

  function removePhoto(index) {
    photos.splice(index, 1);
    renderGrid();
  }

  function renderGrid() {
    const grid    = document.getElementById('photo-grid');
    const wrap    = document.getElementById('photo-grid-wrap');
    const empty   = document.getElementById('empty-state');
    const bar     = document.getElementById('bottom-bar');
    const badge   = document.getElementById('photo-count-badge');
    const btnLbl  = document.getElementById('upload-btn-label');

    if (photos.length === 0) {
      wrap.classList.add('hidden');
      empty.classList.remove('hidden');
      bar.classList.add('hidden');
      return;
    }

    empty.classList.add('hidden');
    wrap.classList.remove('hidden');
    bar.classList.remove('hidden');

    const n = photos.length;
    badge.textContent  = `${n} photo${n !== 1 ? 's' : ''}`;
    btnLbl.textContent = `Upload ${n} Photo${n !== 1 ? 's' : ''}`;

    grid.innerHTML = photos.map((p, i) => `
      <div class="thumb-wrap">
        <img src="${p.url}" alt="photo ${i+1}" />
        <button class="thumb-remove" onclick="removePhoto(${i})">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="3">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>`
    ).join('');
  }

  // ── Upload simulation ─────────────────────────────────────────────────
  function startUpload() {
    if (photos.length === 0) return;

    const overlay   = document.getElementById('upload-overlay');
    const progState = document.getElementById('upload-progress-state');
    const succState = document.getElementById('upload-success');
    const fill      = document.getElementById('progress-fill');
    const lbl       = document.getElementById('progress-label');
    const sub       = document.getElementById('upload-sub');

    progState.style.display = 'flex';
    succState.style.display = 'none';
    overlay.classList.add('show');

    const total = photos.length;
    let current = 0;

    function uploadNext() {
      if (current >= total) {
        // Done
        progState.style.display = 'none';
        succState.style.display  = 'flex';
        document.getElementById('success-msg').textContent =
          `${total} photo${total !== 1 ? 's' : ''} uploaded to ${storeName}.`;
        return;
      }

      sub.textContent = `Uploading photo ${current + 1} of ${total}…`;
      animateBar(0, 100, 1200, pct => {
        fill.style.width = pct + '%';
        lbl.textContent  = Math.round(pct) + '%';
      }, () => {
        current++;
        fill.style.width = '0%';
        lbl.textContent  = '0%';
        setTimeout(uploadNext, 200);
      });
    }

    uploadNext();
  }

  function animateBar(from, to, duration, onTick, onDone) {
    const start = performance.now();
    function step(now) {
      const t   = Math.min((now - start) / duration, 1);
      const val = from + (to - from) * easeOut(t);
      onTick(val);
      if (t < 1) requestAnimationFrame(step);
      else onDone();
    }
    requestAnimationFrame(step);
  }

  function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

  function uploadMore() {
    photos = [];
    renderGrid();
    const overlay = document.getElementById('upload-overlay');
    overlay.classList.remove('show');
    // reset file inputs
    document.getElementById('camera-input').value  = '';
    document.getElementById('gallery-input').value = '';
  }
</script>
</body>
</html>
